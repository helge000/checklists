meta:
  callsign: "EXAMPLE"
  icao_type: "TYPE"
  model: "Aircraft Type / Variant"
  revision: "Rev.1"
  columns: 6
  font: dejavu-condensed
  scale: 1.0
  line_spacing: 1.35
  fold_margin_mm: 8
  col_gap_mm: 3.0
  outer_margin_mm: 8
normal:
  - col: 1
    sections:
      - title: BEFORE START
        header_color: black
        items:
          - Normal item: CALLOUT
          - AVIONIC MASTER: "OFF"
          - Engine Start step: START
            style: blue
          - (sub-note / limit text): null
            style: note
          - — CENTERED DIVIDER —: null
            style: centered
          - ABM THRESHOLD: null
            style: centered_blue
          - Critical Warning: null
            style: warn
      - title: RUN UP
        header_color: blue
        items:
          - Brakes: SET
          - Throttle: 1800 RPM
            style: blue
          - (max. drop 175 RPM): null
            style: note
  - col: 2
    sections:
      - title: AFTER TAKE OFF
        header_color: green
        items:
          - Flaps: UP
          - Power: RED. AS REQ.
      - title: OPERATING SPEEDS [KIAS]
        type: speeds
        body_bg: true
        items:
          - Vr: 0
          - Vx: 0
          - Vy: 0
          - Vs: 0
          - Vne: 0
            style: red
          - V glide: 0
            style: red
emergency:
  - col: 1
    sections:
      - title: ENGINE FAILURE
        items:
          - Glide: ESTABLISH
          - Landing Site: SELECT
          - ENGINE MASTER: "OFF"
          - ELECTRIC MASTER: "OFF"
          - Mayday: TRANSMIT
            style: warn
          - EVACUATE: null
            style: warn
  - col: 2
    sections:
      - title: ENGINE FIRE
        items:
          - Fuel Shut-off: CLOSED
          - Throttle: FULL FORWARD
          - Land without engine: null
            style: warn
          - New item: CALLOUT
walkaround:
  - col: 1
    sections:
      - title: GENERAL
        header_color: yellow
        items:
          - Documents: ONBOARD
          - Fire Extinguisher: CHECK
          - Chocks / Tie-downs: REMOVED
      - title: LEFT WING
        header_color: yellow
        items:
          - Fuel Cap: SECURED
          - Fuel Quantity: CHECKED
          - Fuel Sample: CLEAR & CORRECT
          - Wing Surface: NO DAMAGE
          - Aileron: FREE & CORRECT
          - Pitot: CLEAN & UNCOVERED
      - title: NOSE
        header_color: yellow
        items:
          - Engine Cowling: SECURED
          - Oil Level: CHECK
          - Propeller: NO DAMAGE
          - Air Inlet: CLEAR
          - Nose Wheel: TYRE & STEERING
      - title: RIGHT WING
        header_color: yellow
        items:
          - Fuel Cap: SECURED
          - Fuel Quantity: CHECKED
          - Wing Surface: NO DAMAGE
          - Aileron: FREE & CORRECT
          - Flap: NO DAMAGE
      - title: TAIL
        header_color: yellow
        items:
          - Elevator: FREE & CORRECT
          - Rudder: FREE & CORRECT
          - Tail Surfaces: NO DAMAGE
