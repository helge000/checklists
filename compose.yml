services:

  checklist:
    build: .
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ./public:/app/public:ro
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  webhook:
    build: ./deploy
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock    # restart checklist after pull
      - ~/.ssh:/root/.ssh:ro
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    command: python3 deploy/webhook.py
    expose:
      - "9000"
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      checklist:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
